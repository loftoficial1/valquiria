<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALK HUB</title>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #07070a;
  overflow: hidden;
  color: white;
}

/* PARTICLES */
#particles-js {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* HUB */
.container {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* TITLE */
h1 {
  font-size: 90px;
  margin: 0;
  letter-spacing: 10px;
  color: #ff1a1a;
  text-shadow: 0 0 20px red;
}

/* BUTTONS */
.buttons {
  margin-top: 40px;
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
  justify-content: center;
}

.buttons button {
  padding: 18px 38px;
  font-size: 18px;
  border-radius: 16px;

  background: rgba(255,0,0,0.08);
  border: 1px solid rgba(255,0,0,0.6);

  color: white;
  cursor: pointer;
  transition: 0.25s;

  box-shadow: 0 0 12px rgba(255,0,0,0.25);
}

.buttons button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px red;
}

/* TOP RIGHT MEMBERS */
.top-right {
  position: absolute;
  top: 18px;
  right: 18px;
  z-index: 3;
}

.top-right button {
  padding: 12px 18px;
  border-radius: 14px;
  font-size: 14px;

  background: rgba(255,0,0,0.08);
  border: 1px solid rgba(255,0,0,0.6);

  box-shadow: 0 0 12px rgba(255,0,0,0.2);
}

.top-right button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px red;
}

/* DISCORD FLOAT */
.discord-float {
  position: fixed;
  bottom: 18px;
  left: 18px;

  width: 60px;
  height: 60px;

  border-radius: 16px;
  background: rgba(88,101,242,0.18);
  border: 1px solid rgba(88,101,242,0.7);

  display: flex;
  justify-content: center;
  align-items: center;

  cursor: pointer;
  transition: 0.25s;

  box-shadow: 0 0 18px rgba(88,101,242,0.5);
}

.discord-float:hover {
  transform: scale(1.12);
}

.discord-float img {
  width: 30px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  background: rgba(20,20,25,0.9);
  border: 1px solid rgba(255,0,0,0.4);
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 800px;
}

/* CLOSE */
.close {
  position: absolute;
  right: 15px;
  top: 10px;
  cursor: pointer;
  color: red;
}

/* MEMBERS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-top: 15px;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,0,0,0.3);
  border-radius: 14px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 80px;
  height: 80px;
}

.tag {
  margin-top: 5px;
  padding: 5px;
  background: red;
  border-radius: 8px;
  font-size: 12px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 10px;
  background: rgba(0,0,0,0.4);
  color: white;
  border: 1px solid rgba(255,0,0,0.3);
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- MEMBERS -->
<div class="top-right">
  <button onclick="openMembers()">Membros</button>
</div>

<!-- DISCORD -->
<div class="discord-float" onclick="openDiscord()">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</div>

<!-- HUB -->
<div class="container">
  <h1>VALK</h1>

  <div class="buttons">
    <button onclick="openRecruit()">Recrutamento</button>
    <button onclick="openAbout()">Sobre</button>
  </div>
</div>

<!-- RECRUTAMENTO -->
<div class="modal" id="recruitModal">
  <div class="modal-content">
    <span class="close" onclick="closeRecruit()">✖</span>
    <h2>Recrutamento</h2>

    <input id="nick" placeholder="Nick Minecraft">
    <input id="age" placeholder="Idade">
    <textarea id="reason" placeholder="Por que quer entrar?"></textarea>

    <button onclick="sendRecruit()">Enviar</button>
  </div>
</div>

<!-- SOBRE -->
<div class="modal" id="aboutModal">
  <div class="modal-content">
    <span class="close" onclick="closeAbout()">✖</span>
    <h2>Sobre</h2>
    <p>VALK é um clan focado em PvP, estratégia e domínio total.</p>
  </div>
</div>

<!-- MEMBERS -->
<div class="modal" id="membersModal">
  <div class="modal-content">
    <span class="close" onclick="closeMembers()">✖</span>
    <h2>Membros</h2>
    <div class="grid" id="membersGrid"></div>
  </div>
</div>

<!-- DISCORD MODAL -->
<div class="modal" id="discordModal">
  <div class="modal-content">
    <span class="close" onclick="closeDiscord()">✖</span>
    <h2>Discord</h2>

    <iframe 
      src="https://discord.com/widget?id=YOUR_DISCORD_ID&theme=dark"
      width="100%" height="400"
      frameborder="0">
    </iframe>
  </div>
</div>

<script>
/* PARTICLES */
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    color: { value: "#ff0000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: { enable: true, color: "#ff0000" },
    move: { enable: true, speed: 2 }
  }
});

/* MEMBERS */
const members = [
  { name: "Notch", role: "Líder" },
  { name: "Steve", role: "Membro" },
  { name: "Herobrine", role: "Lenda" }
];

function loadMembers(){
  const grid = document.getElementById("membersGrid");
  grid.innerHTML = "";

  members.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="https://mc-heads.net/avatar/${m.name}/100">
      <h3>${m.name}</h3>
      <div class="tag">${m.role}</div>
    `;

    grid.appendChild(card);
  });
}

/* MODALS */
function openRecruit(){ document.getElementById("recruitModal").style.display="flex"; }
function closeRecruit(){ document.getElementById("recruitModal").style.display="none"; }

function openAbout(){ document.getElementById("aboutModal").style.display="flex"; }
function closeAbout(){ document.getElementById("aboutModal").style.display="none"; }

function openMembers(){
  document.getElementById("membersModal").style.display="flex";
  loadMembers();
}
function closeMembers(){ document.getElementById("membersModal").style.display="none"; }

function openDiscord(){ document.getElementById("discordModal").style.display="flex"; }
function closeDiscord(){ document.getElementById("discordModal").style.display="none"; }

function sendRecruit(){
  alert("Enviado!");
  closeRecruit();
}
</script>

</body>
</html>
