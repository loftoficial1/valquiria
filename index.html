<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALK HUB 3D</title>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles-js"></div>

<!-- CAMERA WRAPPER -->
<div class="scene">

  <div class="menu" id="menu">

    <h1>VALK</h1>

    <div class="buttons">
      <button onmouseenter="tilt(-8)" onmouseleave="resetTilt()" onclick="openRecruit()">
        Recrutamento
      </button>

      <button onmouseenter="tilt(8)" onmouseleave="resetTilt()" onclick="openAbout()">
        Sobre
      </button>
    </div>

  </div>

</div>

<!-- DISCORD -->
<div class="discord" onclick="openDiscord()">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</div>

<!-- MODAIS -->
<div class="modal" id="recruitModal">
  <div class="modal-content">
    <span onclick="closeRecruit()" class="close">✖</span>
    <h2>Recrutamento</h2>

    <input id="nick" placeholder="Nick">
    <input id="age" placeholder="Idade">
    <textarea id="reason" placeholder="Motivo"></textarea>

    <button onclick="sendRecruit()">Enviar</button>
  </div>
</div>

<div class="modal" id="aboutModal">
  <div class="modal-content">
    <span onclick="closeAbout()" class="close">✖</span>
    <h2>Sobre</h2>
    <p>VALK é um clan focado em PvP e domínio.</p>
  </div>
</div>

<div class="modal" id="discordModal">
  <div class="modal-content">
    <span onclick="closeDiscord()" class="close">✖</span>
    <h2>Discord</h2>

    <iframe
      src="https://discord.com/widget?id=YOUR_ID&theme=dark"
      width="100%" height="400"></iframe>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
