<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width">

    <title>VALK</title>

    <link rel="stylesheet"
    href="style.css">

</head>
<body>



<!-- HOME -->

<section class="hero">

    <h1>VALK</h1>


    <p>

        um dos melhores clans do survival

    </p>



    <div class="buttons">


        <!-- RECRUTAMENTO -->

        <a

        class="mainBtn"

        href="#"

        onclick="abrirForm()">

            RECRUTAMENTO

        </a>



        <!-- SOBRE -->

        <a

        class="secondBtn"

        href="sobre.html">

            SOBRE

        </a>


    </div>


</section>





<!-- MODAL -->

<div
id="recruitModal"
class="modal">



    <div class="modalBox">


        <h1>RECRUTAMENTO</h1>



        <!-- nick -->

        <input
        type="text"

        id="nick"

        placeholder="Seu nick">



        <!-- função -->

        <select id="funcao">

            <option>PVP</option>

            <option>FARM MAKER</option>

            <option>POT MAKER</option>

        </select>



        <!-- descrição -->

        <textarea

        id="descricao"

        placeholder="Fale sobre você"></textarea>
        <!-- motivo -->

        id="motivo"
        placeholder="Por que quer entrar na VALK?"></textarea>
        <!-- enviar -->

        <button

        onclick="enviarForm()"

        class="discordBtn">

            ENVIAR

        </button>




        <!-- fechar -->

        <button

        onclick="fecharForm()"

        class="closeBtn">

            FECHAR

        </button>


    </div>


</div>





<script>

function abrirForm(){

    document
    .getElementById("recruitModal")
    .style.display = "flex"

}



function fecharForm(){

    document
    .getElementById("recruitModal")
    .style.display = "none"

}




async function enviarForm(){


    let nick =
    document
    .getElementById("nick")
    .value



    let funcao =
    document
    .getElementById("funcao")
    .value



    let descricao =
    document
    .getElementById("descricao")
    .value



    let motivo =
    document
    .getElementById("motivo")
    .value




    if(
        nick == "" ||
        descricao == "" ||
        motivo == ""
    ){

        alert("Preencha todos os campos")

        return

    }




    let webhook =

    "https://discord.com/api/webhooks/1506070001675931788/h2NAckd5uRZGlrBStQlmIS3Kz7-reI9SNUcNb272BimcuRf7cIRED3HQAkF1z43OzkQk"




    let mensagem = {

        embeds:[{

            title:
            "⚔️ NOVO RECRUTAMENTO VALK ⚔️",

            color:0xff003c,



            fields:[

                {

                    name:
                    "👤 NICK DO JOGADOR",

                    value:nick

                },



                {

                    name:
                    "⚔️ FUNÇÃO",

                    value:funcao

                },



                {

                    name:
                    "📜 DESCRIÇÃO",

                    value:descricao

                },



                {

                    name:
                    "🔥 POR QUE ENTRAR?",

                    value:motivo

                }

            ],



            footer:{

                text:"VALK RECRUTAMENTO"

            }

        }]
    }




    await fetch(webhook,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(mensagem)

    })




    alert(
    "Recrutamento enviado!"
    )




    fecharForm()

}

</script>



</body>
</html>

<script src="script.js"></script>
