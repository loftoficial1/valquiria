<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clan RB</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>CLAN RB</h1>
    <p>Força • União • Respeito</p>

    <nav>
      <button onclick="showSection('home')">Início</button>
      <button onclick="showSection('recrutamento')">Recrutamento</button>
      <button onclick="showSection('membros')">Membros</button>
    </nav>
  </header>

  <main>

    <!-- HOME -->
    <section id="home" class="active">
      <h2>Bem-vindo ao Clan RB</h2>
      <p>Um clan focado em evolução e domínio dentro do jogo.</p>
    </section>

    <!-- RECRUTAMENTO -->
    <section id="recrutamento">
      <h2>Recrutamento</h2>
      <p>Preencha o formulário para entrar no clan.</p>

      <form>
        <input type="text" placeholder="Seu nick" required />
        <input type="text" placeholder="Idade" required />
        <textarea placeholder="Por que quer entrar?" required></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>

    <!-- MEMBROS -->
    <section id="membros">
      <h2>Membros do Clan</h2>
      <div class="grid" id="membersGrid"></div>
    </section>

  </main>

  <footer>
    <p>Clan RB © 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
