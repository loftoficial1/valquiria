<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALK HUB</title>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles-js"></div>

<!-- MEMBROS -->
<div class="top-right">
  <button onclick="openMembers(); playClick()" onmouseenter="playHover()">Membros</button>
</div>

<!-- DISCORD -->
<div class="discord-float" onclick="openDiscord(); playClick()" onmouseenter="playHover()">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
</div>

<!-- HUB -->
<div class="container">
  <h1>VALK</h1>

  <div class="buttons">
    <button onclick="openRecruit(); playClick()" onmouseenter="playHover()">Recrutamento</button>
    <button onclick="openAbout(); playClick()" onmouseenter="playHover()">Sobre</button>
  </div>
</div>

<!-- MODAIS -->
<div class="modal" id="recruitModal">
  <div class="modal-content">
    <span class="close" onclick="closeRecruit()">✖</span>
    <h2>Recrutamento</h2>

    <input id="nick" placeholder="Nick Minecraft">
    <input id="age" placeholder="Idade">
    <textarea id="reason" placeholder="Por que quer entrar?"></textarea>

    <button onclick="sendRecruit(); playClick()" onmouseenter="playHover()">Enviar</button>
  </div>
</div>

<div class="modal" id="aboutModal">
  <div class="modal-content">
    <span class="close" onclick="closeAbout()">✖</span>
    <h2>Sobre</h2>
    <p>VALK é um clan focado em PvP, estratégia e domínio total.</p>
  </div>
</div>

<div class="modal" id="membersModal">
  <div class="modal-content">
    <span class="close" onclick="closeMembers()">✖</span>
    <h2>Membros</h2>
    <div class="grid" id="membersGrid"></div>
  </div>
</div>

<div class="modal" id="discordModal">
  <div class="modal-content">
    <span class="close" onclick="closeDiscord()">✖</span>
    <h2>Discord</h2>

    <iframe 
      src="https://discord.com/widget?id=YOUR_DISCORD_ID&theme=dark"
      width="100%" height="400"
      frameborder="0">
    </iframe>
  </div>
</div>

<!-- SONS -->
<audio id="hoverSound" src="https://www.myinstants.com/media/sounds/menu-click.wav"></audio>
<audio id="clickSound" src="https://www.myinstants.com/media/sounds/mouse-click.wav"></audio>

<script src="script.js"></script>
</body>
</html>
